name: Run argument comment lint
description: Run argument-comment-lint on codex-rs via Bazel.

inputs:
  target:
    description: Runner target passed to setup-bazel-ci.
    required: true
  buildbuddy-api-key:
    description: BuildBuddy API key used by Bazel CI.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-bazel-ci
      with:
        target: ${{ inputs.target }}
        install-test-prereqs: true

    - name: Install Linux sandbox build dependencies
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo DEBIAN_FRONTEND=noninteractive apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

    - name: Run argument comment lint on codex-rs via Bazel
      if: ${{ runner.os == 'Linux' }}
      env:
        BUILDBUDDY_API_KEY: ${{ inputs.buildbuddy-api-key }}
      shell: bash
      run: |
        heartbeat() {
          while true; do
            sleep 60
            if [[ "${CODEX_BAZEL_FORCE_LOCAL:-0}" == "1" ]]; then
              echo "argument comment lint still running via source wrapper ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
            else
              echo "argument comment lint still running via Bazel ($(date -u '+%Y-%m-%dT%H:%M:%SZ'))"
            fi
          done
        }

        heartbeat &
        heartbeat_pid=$!
        cleanup() {
          kill "$heartbeat_pid" 2>/dev/null || true
        }
        trap cleanup EXIT

        set +e
        if [[ "${CODEX_BAZEL_FORCE_LOCAL:-0}" == "1" ]]; then
          rustup toolchain install nightly-2025-09-18 \
            --profile minimal \
            --component llvm-tools-preview \
            --component rustc-dev \
            --component rust-src \
            --no-self-update
          cargo install --locked cargo-dylint dylint-link

          timeout --foreground --signal=TERM --kill-after=30s 110m \
            ./tools/argument-comment-lint/run.py
        else
          bazel_targets="$(./tools/argument-comment-lint/list-bazel-targets.sh)"
          timeout --foreground --signal=TERM --kill-after=30s 110m \
            ./.github/scripts/run-bazel-ci.sh \
              -- \
              build \
              --config=argument-comment-lint \
              --keep_going \
              --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
              -- \
              ${bazel_targets}
        fi
        status=$?
        set -e

        if [[ $status -eq 124 ]]; then
          if [[ "${CODEX_BAZEL_FORCE_LOCAL:-0}" == "1" ]]; then
            echo "argument comment lint source-wrapper step exceeded 110 minutes; failing explicitly before the 120-minute job timeout so shared CI follow-up can diagnose it."
          else
            echo "argument comment lint Bazel step exceeded 110 minutes; failing explicitly before the 120-minute job timeout so shared CI follow-up can diagnose it."
          fi
        fi

        exit "$status"

    - name: Run argument comment lint on codex-rs via Bazel
      if: ${{ runner.os == 'macOS' }}
      env:
        BUILDBUDDY_API_KEY: ${{ inputs.buildbuddy-api-key }}
      shell: bash
      run: |
        bazel_targets="$(./tools/argument-comment-lint/list-bazel-targets.sh)"
        ./.github/scripts/run-bazel-ci.sh \
          -- \
          build \
          --config=argument-comment-lint \
          --keep_going \
          --build_metadata=COMMIT_SHA=${GITHUB_SHA} \
          -- \
          ${bazel_targets}

    - name: Run argument comment lint on codex-rs via Bazel
      if: ${{ runner.os == 'Windows' }}
      env:
        BUILDBUDDY_API_KEY: ${{ inputs.buildbuddy-api-key }}
      shell: bash
      run: |
        ./.github/scripts/run-argument-comment-lint-bazel.sh \
          --config=argument-comment-lint \
          --platforms=//:local_windows \
          --keep_going \
          --build_metadata=COMMIT_SHA=${GITHUB_SHA}
